<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card p-5 border-0 shadow-lg">

        <h2 class="fw-bold mb-4">

            Chỉnh sửa sản phẩm

        </h2>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Tên sản phẩm

                </label>

                <input type="text"
                       class="form-control"
                       name="name"
                       value="{{ product.name }}">

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Giá

                </label>

                <input type="number"
                       class="form-control"
                       name="price"
                       value="{{ product.price }}">

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Mô tả

                </label>

                <textarea class="form-control"
                          rows="5"
                          name="description">{{ product.description }}</textarea>

            </div>
            <div class="mb-3">

                <label class="form-label">

                    Mô tả ngắn

                </label>

                <input type="text"
                    class="form-control"
                    name="short_description"
                    value="{{ product.short_description }}">

            </div>
            <div class="mb-4">

                <label class="form-label">

                    Link ảnh

                </label>

                <input type="text"
                       class="form-control"
                       name="image"
                       value="{{ product.image }}">

            </div>

            <button class="btn btn-success">

                Cập nhật sản phẩm

            </button>

            <a href="/admin"
               class="btn btn-secondary">

                Quay lại

            </a>

        </form>

    </div>

</div>

</body>

</html>
