<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Thanh Toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success shadow">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">

            🍵 Trà Phúc Thái

        </a>

        <a href="/cart"
           class="btn btn-light">

            Quay lại giỏ hàng

        </a>

    </div>

</nav>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-body p-5">

                    <h2 class="fw-bold text-center mb-4">

                        💳 Thanh Toán Đơn Hàng

                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Họ và tên

                            </label>

                            <input type="text"
                                   class="form-control"
                                   name="name"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Số điện thoại

                            </label>

                            <input type="text"
                                   class="form-control"
                                   name="phone"
                                   required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Địa chỉ nhận hàng

                            </label>

                            <textarea class="form-control"
                                      rows="4"
                                      name="address"
                                      required></textarea>

                        </div>

                        <div class="alert alert-success">

                            <h4 class="mb-0">

                                Tổng thanh toán:
                                <strong>

                                    {{ "{:,}".format(total) }}đ

                                </strong>

                            </h4>

                        </div>

                        <button class="btn btn-success btn-lg w-100">

                            <i class="fa-solid fa-credit-card"></i>

                            Xác Nhận Đặt Hàng

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
